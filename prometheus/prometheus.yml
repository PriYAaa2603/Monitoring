global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: mysqld
    static_configs:
      - targets:
          - mysqld-exporter-1:9104
        labels:
          instance: mysql-instance-1
      - targets:
          - mysqld-exporter-2:9104
        labels:
          instance: mysql-instance-2
      - targets:
          - mysqld-exporter-3:9104
        labels:
          instance: mysql-instance-3

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: telegraf
    static_configs:
      - targets:
          - telegraf:9273
